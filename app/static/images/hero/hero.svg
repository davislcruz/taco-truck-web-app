<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <!-- Warm, appetizing brand gradient (keep it bright enough to not look like a funeral) -->
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7f2f22"/>
      <stop offset="55%" stop-color="#9a4937"/>
      <stop offset="100%" stop-color="#b98a42"/>
    </linearGradient>

    <!-- Legibility vignette. Use stop-opacity (valid SVG) instead of rgba() in stop-color. -->
    <radialGradient id="v" cx="50%" cy="38%" r="80%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="65%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.22"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#g)"/>
  <rect width="1600" height="900" fill="url(#v)"/>

  <!-- Subtle diagonal stripes -->
  <g opacity="0.10">
    <path d="M-260 170 L1860 -150" stroke="#fff" stroke-width="26"/>
    <path d="M-260 310 L1860 -10" stroke="#fff" stroke-width="26"/>
    <path d="M-260 450 L1860 130" stroke="#fff" stroke-width="26"/>
  </g>
</svg>
