<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin - {{ app_name }}{% endblock %}</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'taco-orange': '#f97316',
                        'taco-red': '#dc2626',
                        'taco-yellow': '#fbbf24',
                        'taco-green': '#16a34a',
                    }
                }
            }
        }
    </script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>

    <!-- Custom styles -->
    <link rel="stylesheet" href="/static/css/custom.css">

    {% block head %}{% endblock %}
</head>
<body class="min-h-screen bg-gray-50">
    <!-- Admin Navigation -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-4">
                    <a href="/admin" class="text-xl font-bold text-gray-800">
                        <span class="text-taco-red">Admin</span> Dashboard
                    </a>
                </div>

                <div class="flex items-center space-x-4">
                    <a href="/admin" class="text-gray-600 hover:text-taco-red transition">Dashboard</a>
                    <a href="/admin/orders" class="text-gray-600 hover:text-taco-red transition">Orders</a>
                    <a href="/admin/menu" class="text-gray-600 hover:text-taco-red transition">Menu</a>
                    <a href="/menu" class="text-gray-500 hover:text-gray-700 transition text-sm">View Site</a>
                    <a href="/logout" class="px-3 py-1.5 bg-taco-red text-white rounded-lg text-sm hover:bg-red-700 transition">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Flash Messages -->
    {% if error %}
    <div class="max-w-7xl mx-auto px-4 mt-4">
        <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg">
            {{ error }}
        </div>
    </div>
    {% endif %}

    {% if success %}
    <div class="max-w-7xl mx-auto px-4 mt-4">
        <div class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg">
            {{ success }}
        </div>
    </div>
    {% endif %}

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>

    <!-- Admin Footer -->
    <footer class="mt-auto py-6 border-t border-gray-200 bg-white">
        <div class="max-w-7xl mx-auto px-4 text-center text-sm text-gray-500">
            <p>Admin Dashboard · Taco Truck · <a href="/menu" class="hover:text-taco-red">View Live Site</a></p>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
