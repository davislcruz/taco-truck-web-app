{% extends "base.html" %}

{% block title %}Cart - {{ app_name }}{% endblock %}

{% block content %}
<div class="mb-8">
    <h1 class="text-3xl font-bold text-gray-800">Your Cart</h1>
</div>

<div id="cart-container" class="grid grid-cols-1 lg:grid-cols-3 gap-8">
    <!-- Cart Items -->
    <div class="lg:col-span-2">
        <div id="cart-items" class="space-y-4">
            <!-- Items will be rendered here by JS -->
        </div>
        
        <div id="empty-cart" class="text-center py-12 hidden">
            <p class="text-gray-500 text-lg mb-4">Your cart is empty</p>
            <a href="/menu" class="inline-block poster-btn px-6 py-2">
                Browse Menu
            </a>
        </div>
    </div>
    
    <!-- Order Summary -->
    <div class="lg:col-span-1">
        <div class="admin-panel shadow-md p-6 sticky top-24">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Order Summary</h2>
            
            <div class="space-y-2 mb-4">
                <div class="flex justify-between text-gray-600">
                    <span>Subtotal</span>
                    <span id="subtotal">$0.00</span>
                </div>
                <div class="flex justify-between text-gray-600">
                    <span>Tax (8%)</span>
                    <span id="tax">$0.00</span>
                </div>
                <hr class="my-2">
                <div class="flex justify-between font-bold text-lg">
                    <span>Total</span>
                    <span id="total" class="text-taco-orange">$0.00</span>
                </div>
            </div>
            
            <!-- Customer Info Form -->
            <form id="checkout-form" action="/checkout" method="POST" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Your Name</label>
                    <input type="text" name="customer_name" required
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-taco-orange focus:border-transparent"
                        placeholder="Enter your name">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                    <input type="tel" name="customer_phone" required
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-taco-orange focus:border-transparent"
                        placeholder="For order pickup">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Special Instructions</label>
                    <textarea name="notes" rows="2"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-taco-orange focus:border-transparent"
                        placeholder="Any special requests?"></textarea>
                </div>
                
                <button type="submit" id="checkout-btn"
                    class="w-full poster-btn py-3 font-bold text-lg disabled:opacity-50 disabled:cursor-not-allowed">
                    Place Order
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function renderCart() {
        const items = Cart.getItems();
        const container = document.getElementById('cart-items');
        const emptyCart = document.getElementById('empty-cart');
        const checkoutBtn = document.getElementById('checkout-btn');
        
        if (items.length === 0) {
            container.innerHTML = '';
            emptyCart.classList.remove('hidden');
            checkoutBtn.disabled = true;
            updateTotals(0);
            return;
        }
        
        emptyCart.classList.add('hidden');
        checkoutBtn.disabled = false;
        
        let html = '';
        let subtotal = 0;
        
        items.forEach(item => {
            const itemTotal = item.price * item.quantity;
            subtotal += itemTotal;
            
            html += `
                <div class="menu-card p-4 flex items-center justify-between">
                    <div class="flex items-center space-x-4">
                        <div class="thumb-placeholder" aria-hidden="true">•</div>
                        <div>
                            <h3 class="font-bold text-gray-800">${item.name}</h3>
                            <p class="text-gray-600">$${item.price.toFixed(2)} each</p>
                        </div>
                    </div>

                    <div class="flex items-center space-x-4">
                        <div class="flex items-center space-x-2">
                            <button type="button" onclick="updateQuantity(${item.id}, ${item.quantity - 1})" class="qty-btn" aria-label="Decrease quantity">−</button>
                            <span class="qty-pill" aria-label="Quantity">${item.quantity}</span>
                            <button type="button" onclick="updateQuantity(${item.id}, ${item.quantity + 1})" class="qty-btn" aria-label="Increase quantity">
                                +
                            </button>
                        </div>

                        <div class="text-right">
                            <p class="font-bold text-taco-orange">$${itemTotal.toFixed(2)}</p>
                            <button type="button" onclick="removeItem(${item.id})" class="text-red-600 text-sm hover:underline">
                                Remove
                            </button>
                        </div>
                    </div>
                </div>
            `;
        });
        
        container.innerHTML = html;
        updateTotals(subtotal);
    }
    
    function updateTotals(subtotal) {
        const tax = subtotal * 0.08;
        const total = subtotal + tax;
        
        document.getElementById('subtotal').textContent = `$${subtotal.toFixed(2)}`;
        document.getElementById('tax').textContent = `$${tax.toFixed(2)}`;
        document.getElementById('total').textContent = `$${total.toFixed(2)}`;
    }
    
    function updateQuantity(itemId, newQuantity) {
        if (newQuantity <= 0) {
            Cart.remove(itemId);
        } else {
            Cart.update(itemId, newQuantity);
        }
        renderCart();
    }
    
    function removeItem(itemId) {
        Cart.remove(itemId);
        renderCart();
    }
    
    // Initial render
    renderCart();
</script>
{% endblock %}
