{% extends "base.html" %}

{% block title %}Login - {{ app_name }}{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-xl shadow-lg p-8">
        <div class="text-center mb-8">
            <span class="text-6xl">🔐</span>
            <h1 class="text-2xl font-bold text-gray-800 mt-4">Admin Login</h1>
            <p class="text-gray-600">Sign in to manage your taco truck</p>
        </div>
        
        <form action="/login" method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" name="username" required autofocus
                    class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-taco-orange focus:border-transparent"
                    placeholder="Enter username">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required
                    class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-taco-orange focus:border-transparent"
                    placeholder="Enter password">
            </div>
            
            <button type="submit"
                class="w-full bg-taco-orange text-white py-3 rounded-lg font-bold text-lg hover:bg-orange-600 transition">
                Sign In 🌮
            </button>
        </form>
        
        <div class="mt-6 text-center text-sm text-gray-500">
            <p>Default: <code class="bg-gray-100 px-2 py-1 rounded">admin</code> / <code class="bg-gray-100 px-2 py-1 rounded">admin123</code></p>
        </div>
    </div>
</div>
{% endblock %}
